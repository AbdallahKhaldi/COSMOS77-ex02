</text><text class="terminal-2647430706-r1" x="0" y="93.2" textLength="12.2" clip-path="url(#terminal-2647430706-line-3)">│</text><text class="terminal-2647430706-r1" x="24.4" y="93.2" textLength="1171.2" clip-path="url(#terminal-2647430706-line-3)">I&#160;speak&#160;first,&#160;so&#160;let&#160;me&#160;preempt&#160;the&#160;objection&#160;my&#160;opponent&#160;will&#160;surely&#160;raise:&#160;that&#160;social&#160;media&#160;</text><text class="terminal-2647430706-r1" x="1207.8" y="93.2" textLength="12.2" clip-path="url(#terminal-2647430706-line-3)">│</text><text class="terminal-2647430706-r1" x="1220" y="93.2" textLength="12.2" clip-path="url(#terminal-2647430706-line-3)">
</text><text class="terminal-2647430706-r1" x="0" y="117.6" textLength="12.2" clip-path="url(#terminal-2647430706-line-4)">│</text><text class="terminal-2647430706-r1" x="24.4" y="117.6" textLength="1159" clip-path="url(#terminal-2647430706-line-4)">spreads&#160;misinformation&#160;and&#160;harms&#160;wellbeing.&#160;Those&#160;are&#160;real&#160;concerns&#160;—&#160;but&#160;they&#160;are&#160;problems&#160;of&#160;</text><text class="terminal-2647430706-r1" x="1207.8" y="117.6" textLength="12.2" clip-path="url(#terminal-2647430706-line-4)">│</text><text class="terminal-2647430706-r1" x="1220" y="117.6" textLength="12.2" clip-path="url(#terminal-2647430706-line-4)">
</text><text class="terminal-2647430706-r1" x="0" y="142" textLength="12.2" clip-path="url(#terminal-2647430706-line-5)">│</text><text class="terminal-2647430706-r1" x="24.4" y="142" textLength="1098" clip-path="url(#terminal-2647430706-line-5)">*design&#160;and&#160;policy*,&#160;not&#160;of&#160;the&#160;medium&#160;itself.&#160;Condemning&#160;social&#160;media&#160;for&#160;misuse&#160;is&#160;like&#160;</text><text class="terminal-2647430706-r1" x="1207.8" y="142" textLength="12.2" clip-path="url(#terminal-2647430706-line-5)">│</text><text class="terminal-2647430706-r1" x="1220" y="142" textLength="12.2" clip-path="url(#terminal-2647430706-line-5)">
</text><text class="terminal-2647430706-r1" x="0" y="166.4" textLength="12.2" clip-path="url(#terminal-2647430706-line-6)">│</text><text class="terminal-2647430706-r1" x="24.4" y="166.4" textLength="1159" clip-path="url(#terminal-2647430706-line-6)">condemning&#160;the&#160;printing&#160;press&#160;for&#160;libel.&#160;The&#160;remedy&#160;is&#160;better&#160;moderation&#160;and&#160;digital&#160;literacy,&#160;</text><text class="terminal-2647430706-r1" x="1207.8" y="166.4" textLength="12.2" clip-path="url(#terminal-2647430706-line-6)">│</text><text class="terminal-2647430706-r1" x="1220" y="166.4" textLength="12.2" clip-path="url(#terminal-2647430706-line-6)">
</text><text class="terminal-2647430706-r1" x="0" y="190.8" textLength="12.2" clip-path="url(#terminal-2647430706-line-7)">│</text><text class="terminal-2647430706-r1" x="24.4" y="190.8" textLength="829.6" clip-path="url(#terminal-2647430706-line-7)">not&#160;abandoning&#160;the&#160;most&#160;powerful&#160;connective&#160;tool&#160;humanity&#160;has&#160;built.</text><text class="terminal-2647430706-r1" x="1207.8" y="190.8" textLength="12.2" clip-path="url(#terminal-2647430706-line-7)">│</text><text class="terminal-2647430706-r1" x="1220" y="190.8" textLength="12.2" clip-path="url(#terminal-2647430706-line-7)">
</text><text class="terminal-2647430706-r1" x="0" y="215.2" textLength="12.2" clip-path="url(#terminal-2647430706-line-8)">│</text><text class="terminal-2647430706-r1" x="1207.8" y="215.2" textLength="12.2" clip-path="url(#terminal-2647430706-line-8)">│</text><text class="terminal-2647430706-r1" x="1220" y="215.2" textLength="12.2" clip-path="url(#terminal-2647430706-line-8)">
</text><text class="terminal-2647430706-r1" x="0" y="239.6" textLength="12.2" clip-path="url(#terminal-2647430706-line-9)">│</text><text class="terminal-2647430706-r1" x="24.4" y="239.6" textLength="1122.4" clip-path="url(#terminal-2647430706-line-9)">My&#160;new&#160;point:&#160;**economic&#160;empowerment.**&#160;Social&#160;media&#160;has&#160;democratized&#160;commerce&#160;for&#160;ordinary&#160;</text><text class="terminal-2647430706-r1" x="1207.8" y="239.6" textLength="12.2" clip-path="url(#terminal-2647430706-line-9)">│</text><text class="terminal-2647430706-r1" x="1220" y="239.6" textLength="12.2" clip-path="url(#terminal-2647430706-line-9)">
</text><text class="terminal-2647430706-r1" x="0" y="264" textLength="12.2" clip-path="url(#terminal-2647430706-line-10)">│</text><text class="terminal-2647430706-r1" x="24.4" y="264" textLength="1171.2" clip-path="url(#terminal-2647430706-line-10)">people.&#160;Roughly&#160;94%&#160;of&#160;small&#160;businesses&#160;use&#160;it,&#160;and&#160;they&#160;report&#160;around&#160;a&#160;20%&#160;annual&#160;revenue&#160;lift</text><text class="terminal-2647430706-r1" x="1207.8" y="264" textLength="12.2" clip-path="url(#terminal-2647430706-line-10)">│</text><text class="terminal-2647430706-r1" x="1220" y="264" textLength="12.2" clip-path="url(#terminal-2647430706-line-10)">
</text><text class="terminal-2647430706-r1" x="0" y="288.4" textLength="12.2" clip-path="url(#terminal-2647430706-line-11)">│</text><text class="terminal-2647430706-r1" x="24.4" y="288.4" textLength="1171.2" clip-path="url(#terminal-2647430706-line-11)">from&#160;social&#160;marketing&#160;—&#160;with&#160;TikTok&#160;alone&#160;driving&#160;an&#160;estimated&#160;$9.2&#160;billion&#160;in&#160;US&#160;small-business</text><text class="terminal-2647430706-r1" x="1207.8" y="288.4" textLength="12.2" clip-path="url(#terminal-2647430706-line-11)">│</text><text class="terminal-2647430706-r1" x="1220" y="288.4" textLength="12.2" clip-path="url(#terminal-2647430706-line-11)">
</text><text class="terminal-2647430706-r1" x="0" y="312.8" textLength="12.2" clip-path="url(#terminal-2647430706-line-12)">│</text><text class="terminal-2647430706-r1" x="24.4" y="312.8" textLength="1159" clip-path="url(#terminal-2647430706-line-12)">sales&#160;yearly.&#160;Whole&#160;livelihoods&#160;—&#160;creators,&#160;local&#160;shops,&#160;artisans&#160;—&#160;now&#160;exist&#160;because&#160;a&#160;single&#160;</text><text class="terminal-2647430706-r1" x="1207.8" y="312.8" textLength="12.2" clip-path="url(#terminal-2647430706-line-12)">│</text><text class="terminal-2647430706-r1" x="1220" y="312.8" textLength="12.2" clip-path="url(#terminal-2647430706-line-12)">
