</text><text class="terminal-2647430706-r1" x="0" y="386" textLength="12.2" clip-path="url(#terminal-2647430706-line-15)">│</text><text class="terminal-2647430706-r1" x="24.4" y="386" textLength="1110.2" clip-path="url(#terminal-2647430706-line-15)">Add&#160;to&#160;this&#160;Pew&#x27;s&#160;finding&#160;that&#160;a&#160;median&#160;of&#160;64%&#160;across&#160;emerging&#160;nations&#160;call&#160;the&#160;internet&#160;a&#160;</text><text class="terminal-2647430706-r1" x="1207.8" y="386" textLength="12.2" clip-path="url(#terminal-2647430706-line-15)">│</text><text class="terminal-2647430706-r1" x="1220" y="386" textLength="12.2" clip-path="url(#terminal-2647430706-line-15)">
